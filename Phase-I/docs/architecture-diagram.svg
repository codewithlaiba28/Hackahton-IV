<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#1e293b">
    Phase 1: Zero-Backend-LLM Architecture
  </text>
  
  <!-- User Section -->
  <rect x="400" y="70" width="400" height="60" rx="8" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="2"/>
  <text x="600" y="95" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1e40af">USER (Student)</text>
  <text x="600" y="115" text-anchor="middle" font-family="Arial" font-size="14" fill="#1e40af">ChatGPT App Interface</text>
  
  <!-- Arrow 1 -->
  <line x1="600" y1="130" x2="600" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="610" y="150" font-family="Arial" font-size="12" fill="#64748b">HTTPS</text>
  
  <!-- ChatGPT App Section -->
  <rect x="100" y="160" width="1000" height="180" rx="8" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="2"/>
  <text x="600" y="190" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#047857">ChatGPT App (OpenAI Platform)</text>
  <text x="600" y="215" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#047857">★ ALL INTELLIGENCE LIVES HERE ★</text>
  
  <!-- ChatGPT Responsibilities -->
  <rect x="150" y="230" width="200" height="90" rx="4" fill="#10b981" opacity="0.2" stroke="#10b981"/>
  <text x="250" y="250" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#047857">ChatGPT Does:</text>
  <text x="250" y="270" text-anchor="middle" font-family="Arial" font-size="11" fill="#047857">• Explanations</text>
  <text x="250" y="288" text-anchor="middle" font-family="Arial" font-size="11" fill="#047857">• Tutoring</text>
  <text x="250" y="306" text-anchor="middle" font-family="Arial" font-size="11" fill="#047857">• Encouragement</text>
  
  <!-- Agent Skills -->
  <rect x="400" y="230" width="400" height="90" rx="4" fill="#10b981" opacity="0.2" stroke="#10b981"/>
  <text x="600" y="250" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#047857">4 Agent Skills:</text>
  <text x="600" y="270" text-anchor="middle" font-family="Arial" font-size="11" fill="#047857">concept-explainer • quiz-master • socratic-tutor • progress-motivator</text>
  <text x="600" y="295" text-anchor="middle" font-family="Arial" font-size="11" fill="#047857">System Prompt + Skill Workflows</text>
  
  <!-- Backend Section -->
  <rect x="150" y="370" width="900" height="220" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2"/>
  <text x="600" y="400" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#b45309">FastAPI Backend (Deterministic - ZERO LLM)</text>
  <text x="600" y="425" text-anchor="middle" font-family="Arial" font-size="12" fill="#b45309">⚠️ No openai, anthropic, langchain imports</text>
  
  <!-- API Routes -->
  <rect x="180" y="440" width="280" height="130" rx="4" fill="#f59e0b" opacity="0.2" stroke="#f59e0b"/>
  <text x="320" y="460" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#b45309">API Routes</text>
  <text x="320" y="480" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">GET /chapters</text>
  <text x="320" y="495" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">GET /chapters/{id}</text>
  <text x="320" y="510" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">GET /chapters/{id}/next, /prev</text>
  <text x="320" y="525" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">GET /search?q=</text>
  <text x="320" y="540" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">GET, POST /quizzes/{id}</text>
  <text x="320" y="555" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">GET, PUT /progress/{user_id}</text>
  
  <!-- Services -->
  <rect x="490" y="440" width="220" height="130" rx="4" fill="#f59e0b" opacity="0.2" stroke="#f59e0b"/>
  <text x="600" y="460" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#b45309">Services</text>
  <text x="600" y="480" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">r2_service.py</text>
  <text x="600" y="495" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">quiz_service.py</text>
  <text x="600" y="510" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">progress_service.py</text>
  <text x="600" y="525" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">access_service.py</text>
  <text x="600" y="545" text-anchor="middle" font-family="Arial" font-size="10" fill="#b45309">(Business Logic Layer)</text>
  
  <!-- Auth -->
  <rect x="740" y="440" width="280" height="130" rx="4" fill="#f59e0b" opacity="0.2" stroke="#f59e0b"/>
  <text x="880" y="460" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#b45309">Authentication</text>
  <text x="880" y="480" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">API Key (X-API-Key)</text>
  <text x="880" y="495" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">User Tier Validation</text>
  <text x="880" y="510" text-anchor="middle" font-family="Arial" font-size="11" fill="#b45309">Freemium Gate Enforcement</text>
  <text x="880" y="530" text-anchor="middle" font-family="Arial" font-size="10" fill="#b45309">401 for invalid/missing keys</text>
  
  <!-- Arrow 2 -->
  <line x1="600" y1="590" x2="600" y2="620" stroke="#64748b" stroke-width="2"/>
  <text x="610" y="610" font-family="Arial" font-size="12" fill="#64748b">SQL</text>
  
  <!-- Database Section -->
  <rect x="100" y="620" width="450" height="150" rx="8" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="2"/>
  <text x="325" y="650" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#6d28d9">PostgreSQL (Neon)</text>
  
  <!-- DB Tables -->
  <text x="325" y="675" text-anchor="middle" font-family="Arial" font-size="11" fill="#6d28d9">
    users | chapters | quiz_questions | chapter_progress | quiz_attempts | daily_activity
  </text>
  <text x="325" y="695" text-anchor="middle" font-family="Arial" font-size="10" fill="#6d28d9">
    • User tiers (free/premium/pro)
  </text>
  <text x="325" y="710" text-anchor="middle" font-family="Arial" font-size="10" fill="#6d28d9">
    • Chapter metadata + is_free flags
  </text>
  <text x="325" y="725" text-anchor="middle" font-family="Arial" font-size="10" fill="#6d28d9">
    • Quiz questions with answer keys
  </text>
  <text x="325" y="740" text-anchor="middle" font-family="Arial" font-size="10" fill="#6d28d9">
    • Progress tracking + streaks
  </text>
  
  <!-- Arrow 3 -->
  <line x1="600" y1="695" x2="650" y2="695" stroke="#64748b" stroke-width="2"/>
  <text x="625" y="685" font-family="Arial" font-size="11" fill="#64748b">R2 API</text>
  
  <!-- R2 Section -->
  <rect x="700" y="620" width="400" height="150" rx="8" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="2"/>
  <text x="900" y="650" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#b91c1c">Cloudflare R2</text>
  <text x="900" y="680" text-anchor="middle" font-family="Arial" font-size="11" fill="#b91c1c">Content Storage:</text>
  <text x="900" y="700" text-anchor="middle" font-family="Arial" font-size="10" fill="#b91c1c">chapters/ch-001/content.md</text>
  <text x="900" y="715" text-anchor="middle" font-family="Arial" font-size="10" fill="#b91c1c">chapters/ch-002/content.md</text>
  <text x="900" y="730" text-anchor="middle" font-family="Arial" font-size="10" fill="#b91c1c">chapters/ch-003/content.md</text>
  <text x="900" y="745" text-anchor="middle" font-family="Arial" font-size="10" fill="#b91c1c">chapters/ch-004/content.md</text>
  <text x="900" y="760" text-anchor="middle" font-family="Arial" font-size="10" fill="#b91c1c">chapters/ch-005/content.md</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <rect x="50" y="50" width="180" height="80" rx="4" fill="white" stroke="#e2e8f0"/>
  <text x="140" y="70" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1e293b">Legend:</text>
  <rect x="60" y="80" width="20" height="15" fill="#3b82f6" opacity="0.1" stroke="#3b82f6"/>
  <text x="85" y="92" font-family="Arial" font-size="10" fill="#1e293b">User</text>
  <rect x="60" y="100" width="20" height="15" fill="#10b981" opacity="0.1" stroke="#10b981"/>
  <text x="85" y="112" font-family="Arial" font-size="10" fill="#1e293b">ChatGPT (LLM)</text>
  <rect x="60" y="120" width="20" height="15" fill="#f59e0b" opacity="0.1" stroke="#f59e0b"/>
  <text x="85" y="132" font-family="Arial" font-size="10" fill="#1e293b">Backend (No LLM)</text>
</svg>
